<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heyyo.com</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:white;
    color:black;
}

/* ==================== TAMBAHAN STYLE BARU ==================== */
.navbar {
    width: 100%;
    padding: 15px 20px;
    box-sizing: border-box;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 999;
}

#brand-logo {
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    display: inline-block;
}

.choice-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

#feedback-error {
    margin-top: 15px;
    font-weight: bold;
    color: red;
    height: 20px;
}

.gift-container {
    display: flex;
    gap: 15px;
    margin-top: 15px;
}

.gift-btn {
    background: #ff4757;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    padding: 12px 25px;
    cursor: pointer;
}

#devilBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 30px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 9999;
    padding: 0;
    margin: 0;
}

/* KODE BARU: Animasi Glitch Serem dan Agresif */
@keyframes hardcoreGlitch {
    0% { transform: translate(0) skew(0deg); background: #000; filter: invert(0) contrast(1); }
    5% { transform: translate(-15px, 12px) skew(15deg); background: #ff0000; filter: invert(1) contrast(5); }
    10% { transform: translate(20px, -15px) skew(-20deg); background: #000; filter: hue-rotate(90deg) brightness(3); }
    15% { transform: translate(-5px, -25px); background: #00ff00; filter: blur(2px); }
    20% { transform: translate(25px, 15px) skew(30deg); background: #0000ff; filter: invert(0) saturate(10); }
    25% { transform: translate(-25px, 5px); background: #ffff00; filter: contrast(10); }
    30% { transform: translate(15px, -15px) skew(-10deg); background: #000; color: #ff0000; }
    35% { transform: translate(-20px, 20px); background: #ff00ff; filter: hue-rotate(180deg); }
    40% { transform: translate(30px, -5px) skew(25deg); background: #00ffff; }
    45% { transform: translate(-10px, -30px); background: #333; filter: invert(1); }
    50% { transform: translate(5px, 25px) skew(-30deg); background: #900; color: #fff; }
    55% { transform: translate(-30px, 10px); background: #000; filter: brightness(0.2); }
    60% { transform: translate(20px, -20px) skew(5deg); background: #ff4400; }
    65% { transform: translate(-15px, -15px); background: #000; filter: contrast(8) invert(1); }
    70% { transform: translate(25px, 25px) skew(-15deg); background: #111; color: #ff0000; }
    75% { transform: translate(-5px, 5px); background: #fff; filter: blur(5px); }
    80% { transform: translate(-25px, -25px) skew(20deg); background: #000; }
    85% { transform: translate(15px, 15px); filter: hue-rotate(270deg) saturate(8); }
    90% { transform: translate(-20px, 5px) skew(-5deg); background: #ff0000; }
    95% { transform: translate(10px, -10px); background: #000; filter: invert(1); }
    100% { transform: translate(0) skew(0deg); background: #000; }
}

.heavy-glitch-active {
    animation: hardcoreGlitch 0.03s infinite !important; /* Dipercepat jalannya */
    overflow: hidden !important;
    user-select: none !important;
}

/* Bikin semua tombol ikut hancur posisinya pas glitch aktif */
.heavy-glitch-active button, .heavy-glitch-active h1, .heavy-glitch-active p, .heavy-glitch-active div {
    color: red !important;
    border-color: red !important;
    transform: skew(10deg) rotate(2deg);
    font-family: 'Courier New', monospace !important;
}
/* ============================================================== */

.page{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

#zero{
    font-size:120px;
    cursor:pointer;
    user-select:none;
}

button{
    padding:10px 20px;
    margin:5px;
    border:1px solid black;
    background:white;
    cursor:pointer;
}

.question{
    font-size:30px;
    margin-bottom:20px;
}

.answers{
    display:flex;
    flex-direction:column;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-5px,5px);}
    40%{transform:translate(5px,-5px);}
    60%{transform:translate(-5px,0);}
    80%{transform:translate(5px,0);}
    100%{transform:translate(0);}
}

.glitch{
    animation:glitch 0.1s infinite;
}
</style>
</head>

<body>

<div class="navbar">
    <div id="brand-logo">heyyo</div>
</div>

<div id="homePage" class="page active">
    <div id="zero">0</div>
</div>

<div id="askPage" class="page">
    <h1 class="question">You wanna play game?</h1>
    <div class="choice-container">
        <button id="btnYes">Yes</button>
        <button id="btnNo">No</button>
    </div>
</div>

<div id="gamePage" class="page">
    <h1>Let's Play</h1>

    <div id="progress"></div>

    <div class="question" id="question"></div>

    <div class="answers" id="answers"></div>
    
    <div id="feedback-error"></div>
</div>

<div id="finishPage" class="page">
    <h1>Congratulations!</h1>
    <p>You completed all questions.</p>
    
    <div id="giftContainer" class="gift-container" style="display:none;">
        <button class="gift-btn" onclick="window.location.href='https://www.youtube.com/watch?v=a4H0Dcf0rk8'">
            Hadiah 🎁✨
        </button>
        <button class="gift-btn" style="background: #e67e22;" onclick="window.location.href='https://www.youtube.com/watch?v=a4H0Dcf0rk8'">
            Reward 🎃
        </button>
    </div>
</div>

<button id="devilBtn" style="display: none;">😈</button>

<script>

const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
const finishPage = document.getElementById("finishPage");

/* TAMBAHAN VARIABEL BARU */
const brandLogo = document.getElementById("brand-logo");
const askPage = document.getElementById("askPage");
const btnYes = document.getElementById("btnYes");
const btnNo = document.getElementById("btnNo");
const feedbackError = document.getElementById("feedback-error");
const giftContainer = document.getElementById("giftContainer");
const devilBtn = document.getElementById("devilBtn");
let isBIndoGame = false; 
/* ======================= */

let clickCount = 0;

document.getElementById("zero").addEventListener("click",()=>{

    clickCount++;

    if(clickCount >= 5){
        isBIndoGame = false; // Memastikan pakai soal bawaan jika lewat klik angka 0
        giftContainer.style.display = "none"; // Sembunyikan kontainer hadiah untuk game asli
        devilBtn.style.display = "none"; // Sembunyikan tombol setan
        currentQuestion = 0; // Reset index soal
        showPage(gamePage);
        loadQuestion();
    }

});

/* TAMBAHAN LOGIKA UNTUK MENU HEYYO */
brandLogo.addEventListener("click", () => {
    showPage(askPage);
});

btnNo.addEventListener("click", () => {
    btnNo.style.display = "none"; // Tombol "No" menghilang saat di-klik
});

btnYes.addEventListener("click", () => {
    isBIndoGame = true; // Menandai kalau user masuk lewat jalur game B. Indonesia
    giftContainer.style.display = "flex"; // Munculkan kontainer hadiah berisi 2 tombol
    devilBtn.style.display = "none"; // Belum muncul sampai game selesai
    currentQuestion = 0; // Reset index soal
    questions = bIndoQuestions; // Ganti kumpulan soal ke versi Bahasa Indonesia
    showPage(gamePage);
    loadQuestion();
});

/* TAMBAHAN LOGIKA TOMBOL SETAN GLITCH PARAH */
devilBtn.addEventListener("click", () => {
    document.body.classList.add("heavy-glitch-active");
});
/* ================================= */

function showPage(page){

    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    page.classList.add("active");

}

// KODE ASLI: Array questions awal dideklarasikan pakai 'let' agar bisa ditukar datanya
let questions = [

{
question:"5 + 3",
answers:[8,6,10,12],
correct:8
},

{
question:"12 - 7",
answers:[3,5,8,10],
correct:5
},

{
question:"8 × 4",
answers:[32,28,9999,36],
correct:32,
secret:9999
},

{
question:"15 + 10",
answers:[20,25,30,35],
correct:25
},

{
question:"9 × 2",
answers:[18,12,16,21],
correct:18
}

];

/* TAMBAHAN: Data 5 Soal Bahasa Indonesia Baru */
const bIndoQuestions = [
    {
        question: "Hewan apa yang warnanya pink?",
        answers: ["Flamingo", "Gajah", "Kucing", "Singa"],
        correct: "Flamingo"
    },
    {
        question: "Gunung tertinggi di dunia adalah...",
        answers: ["Gunung Everest", "Gunung Merapi", "Gunung Fuji", "Gunung Anak Krakatau"],
        correct: "Gunung Everest"
    },
    {
        question: "Warna bendera negara Indonesia adalah...",
        answers: ["Merah Putih", "Biru Kuning", "Hijau Hitam", "Merah Putih Biru"],
        correct: "Merah Putih"
    },
    {
        question: "Ibukota negara Jepang adalah...",
        answers: ["Seoul", "Tokyo", "Beijing", "Bangkok"],
        correct: "Tokyo"
    },
    {
        question: "Berapa jumlah warna pada pelangi secara umum?",
        answers: ["5 warna", "6 warna", "7 warna", "8 warna"],
        correct: "7 warna"
    }
];
/* ========================================== */

let currentQuestion = 0;

function loadQuestion(){

    // TAMBAHAN: Reset teks error tulisan salah setiap muat soal baru
    feedbackError.textContent = "";

    const q = questions[currentQuestion];

    document.getElementById("progress").textContent =
    `Question ${currentQuestion+1}/${questions.length}`;

    // MODIFIKASI SEDIKIT: Tambahkan format " = ?" hanya jika bukan game B. Indonesia
    document.getElementById("question").textContent =
    isBIndoGame ? q.question : q.question + " = ?";

    const answersDiv =
    document.getElementById("answers");

    answersDiv.innerHTML = "";

    q.answers.forEach(answer=>{

        const btn = document.createElement("button");

        btn.textContent = answer;

        btn.onclick = ()=>{

            if(q.secret && answer === q.secret){
                startSecretMode();
                return;
            }

            if(answer === q.correct){

                currentQuestion++;

                if(currentQuestion >= questions.length){
                    showPage(finishPage);
                    // TAMBAHAN: Jika game B. Indonesia selesai, munculkan tombol setan di pojok kiri bawah
                    if(isBIndoGame) {
                        devilBtn.style.display = "block";
                    }
                }else{
                    loadQuestion();
                }

            }else{
                // MODIFIKASI: Jika lewat game B. Indonesia, tulisan salah muncul tanpa mengulang
                if(isBIndoGame) {
                    feedbackError.textContent = "Salah!";
                } else {
                    alert("Wrong answer!");
                }
            }

        };

        answersDiv.appendChild(btn);

    });

}

function startSecretMode(){

    const first =
    confirm("Do you want Secret Mode?");

    if(!first) return;

    const second =
    confirm("Are you sure?");

    if(!second) return;

    const third =
    confirm("Complete 3 difficult tasks to unlock Secret Mode.");

    if(!third) return;

    secretChallenge();

}

function secretChallenge(){

    const q1 =
    prompt("Task 1\n\n17 × 13 = ?");

    if(q1 !== "221"){
        lose();
        return;
    }

    const q2 =
    prompt("Task 2\n\n144 ÷ 12 = ?");

    if(q2 !== "12"){
        lose();
        return;
    }

    const q3 =
    prompt(`Task 3

2 + 2 = 8
3 + 3 = 18
4 + 4 = 32

5 + 5 = ?`);

    if(q3 !== "50"){
        lose();
        return;
    }

    unlockSecret();

}

function lose(){

    document.body.classList.add("glitch");

    setTimeout(()=>{

        document.body.innerHTML = `
        <div style="
            width:100vw;
            height:100vh;
            background:black;
            color:#550000;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-family:Arial;
        ">
            <h1 style="font-size:72px;">YOU LOSE</h1>
            <p>The secret rejects you.</p>
        </div>
        `;

    },1200);

}

function unlockSecret(){

    document.body.innerHTML = `
    <div style="
        width:100vw;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        font-family:Arial;
    ">
        <h1>Secret Mode Unlocked...</h1>
        <p id="loading">0%</p>
    </div>
    `;

    let percent = 0;

    const interval = setInterval(()=>{

        percent += 5;

        document.getElementById("loading").textContent =
        percent + "%";

        if(percent >= 100){

            clearInterval(interval);

            setTimeout(()=>{

                window.location.href =
                "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

            },1000);

        }

    },100);

}

</script>

</body>
</html>
