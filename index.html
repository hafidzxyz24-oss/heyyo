<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heyyo.com</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:white;
    color:black;
    overflow: hidden; /* Mencegah scroll saat main game mobil */
}

/* ==================== STYLE ASLI & SEBELUMNYA ==================== */
.navbar {
    width: 100%;
    padding: 15px 20px;
    box-sizing: border-box;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 999;
}

#brand-logo {
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    display: inline-block;
}

.choice-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    justify-content: center;
}

#feedback-error {
    margin-top: 15px;
    font-weight: bold;
    color: red;
    height: 20px;
}

.gift-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
}

.gift-btn {
    background: #ff4757;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    padding: 12px 25px;
    cursor: pointer;
}

#devilBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 30px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 9999;
    padding: 0;
    margin: 0;
}

#giveUpBtn {
    margin-top: 30px;
    background: #c0392b;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
}

.strobe-fast {
    animation: flash 0.1s steps(2, start) infinite;
}
@keyframes flash { to { background: black; } }

#weakPage {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: black;
    z-index: 10000;
    box-sizing: border-box;
    overflow: hidden;
    font-family: 'Impact', 'Arial Black', sans-serif;
    user-select: none;
}

.weak-text {
    position: absolute;
    color: #800000;
    text-shadow: 3px 3px 0px #300, -3px -3px 0px #000;
    white-space: nowrap;
    line-height: 1;
}

@keyframes hardcoreGlitch {
    0% { transform: translate(0) skew(0deg); filter: invert(0) contrast(1); }
    5% { transform: translate(-15px, 12px) skew(15deg); background: #ff0000; filter: invert(1) contrast(5); }
    10% { transform: translate(20px, -15px) skew(-20deg); filter: hue-rotate(90deg) brightness(3); }
    15% { transform: translate(-5px, -25px); filter: blur(2px); }
    20% { transform: translate(25px, 15px) skew(30deg); background: #0000ff; filter: invert(0) saturate(10); }
    25% { transform: translate(-25px, 5px); filter: contrast(10); }
    30% { transform: translate(15px, -15px) skew(-10deg); color: #ff0000; }
    35% { transform: translate(-20px, 20px); background: #ff00ff; filter: hue-rotate(180deg); }
    40% { transform: translate(30px, -5px) skew(25deg); }
    45% { transform: translate(-10px, -30px); background: #333; filter: invert(1); }
    50% { transform: translate(5px, 25px) skew(-30deg); color: #fff; }
    55% { transform: translate(-30px, 10px); filter: brightness(0.2); }
    60% { transform: translate(20px, -20px) skew(5deg); }
    65% { transform: translate(-15px, -15px); filter: contrast(8) invert(1); }
    70% { transform: translate(25px, 25px) skew(-15deg); color: #ff0000; }
    75% { transform: translate(-5px, 5px); filter: blur(5px); }
    80% { transform: translate(-25px, -25px) skew(20deg); }
    85% { transform: translate(15px, 15px); filter: hue-rotate(270deg) saturate(8); }
    90% { transform: translate(-20px, 5px) skew(-5deg); background: #ff0000; }
    95% { transform: translate(10px, -10px); filter: invert(1); }
    100% { transform: translate(0) skew(0deg); }
}

.heavy-glitch-active {
    animation: hardcoreGlitch 0.03s infinite !important;
    overflow: hidden !important;
    user-select: none !important;
}

.heavy-glitch-active button, .heavy-glitch-active h1, .heavy-glitch-active p, .heavy-glitch-active div {
    color: red !important;
    border-color: red !important;
    transform: skew(10deg) rotate(2deg);
}

.page{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position: absolute;
    top: 0; left: 0;
}

.active{
    display:flex;
}

#zero{ font-size:120px; cursor:pointer; user-select:none; }

button{
    padding:10px 20px;
    margin:5px;
    border:1px solid black;
    background:white;
    cursor:pointer;
}

.question{ font-size:30px; margin-bottom:20px; text-align:center; padding: 0 15px;}
.answers{ display:flex; flex-direction:column; align-items:center; }

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-5px,5px);}
    40%{transform:translate(5px,-5px);}
    60%{transform:translate(-5px,0);}
    80%{transform:translate(5px,0);}
    100%{transform:translate(0);}
}

.glitch{ animation:glitch 0.1s infinite; }

/* ==================== STYLE GAME MOBIL 3D ==================== */
#carGamePage {
    background: #87CEEB; /* Langit biru */
    z-index: 1000;
}
#gameCanvas {
    width: 100vw;
    height: 100vh;
    display: block;
}
#carUI {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    pointer-events: none;
    z-index: 1001;
}
.mobile-controls {
    position: absolute;
    bottom: 30px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 1001;
    user-select: none;
}
.control-btn {
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.5);
    border: 2px solid black;
    border-radius: 50%;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
}
.control-group {
    display: flex;
    gap: 10px;
}
</style>
</head>

<body>

<div id="weakPage"></div>

<div class="navbar">
    <div id="brand-logo">heyyo</div>
</div>

<div id="homePage" class="page active">
    <div id="zero">0</div>
</div>

<div id="askPage" class="page">
    <h1 class="question">You wanna play game?</h1>
    <div class="choice-container">
        <button id="btnYes">Yes</button>
        <button id="btnNo">No</button>
    </div>
</div>

<div id="gamePage" class="page">
    <h1>Let's Play</h1>
    <div id="progress"></div>
    <div class="question" id="question"></div>
    <div class="answers" id="answers"></div>
    <div id="feedback-error"></div>
    <button id="giveUpBtn" style="display:none;">Menyerah 🏳️</button>
</div>

<div id="finishPage" class="page">
    <h1 id="finishTitle">Congratulations!</h1>
    <p id="finishSubtitle">You completed all questions.</p>
    
    <div id="giftContainer" class="gift-container" style="display:none;">
        <button id="hardcoreModeBtn" class="gift-btn" style="background: #8e44ad;">Hardcore Mode 💀</button>
        <button class="gift-btn" style="background: #e67e22;" onclick="window.location.href='https://www.youtube.com/watch?v=a4H0Dcf0rk8'">Reward 🎃</button>
        <button id="carModeBtn" class="gift-btn" style="background: #2980b9;">Game Mobil 🚗</button>
    </div>
</div>

<div id="carGamePage" class="page">
    <div id="carUI">Misi: Cari Objek Kuning (<span id="yellowCounter">0</span>/5)</div>
    <canvas id="gameCanvas"></canvas>
    
    <div class="mobile-controls">
        <div class="control-group">
            <div class="control-btn" id="btnLeft">←</div>
            <div class="control-btn" id="btnRight">→</div>
        </div>
        <div class="control-group">
            <div class="control-btn" id="btnDown">↓</div>
            <div class="control-btn" id="btnUp">↑</div>
        </div>
    </div>
</div>

<div id="postGamePage" class="page">
    <h1 style="font-size: 50px;">Good job! 🎉</h1>
    <div class="choice-container">
        <button id="btnLanjutGame">Lanjut?</button>
        <button id="btnTidakGame">Tidak</button>
    </div>
</div>

<div id="randomQuizPage" class="page">
    <h1>Final Challenge</h1>
    <div id="finalProgress"></div>
    <div class="question" id="finalQuestion"></div>
    <div class="answers" id="finalAnswers"></div>
    <div id="finalFeedback" style="margin-top: 15px; font-weight: bold; color: red;"></div>
</div>

<button id="devilBtn" style="display: none;">😈</button>


<script>
// =========================================================
// LOGIKA UTAMA WEBSITE & QUIZ HEYYO
// =========================================================
const pages = document.querySelectorAll(".page");
function showPage(pageId) {
    pages.forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}

const brandLogo = document.getElementById("brand-logo");
const btnYes = document.getElementById("btnYes");
const btnNo = document.getElementById("btnNo");
const feedbackError = document.getElementById("feedback-error");
const giftContainer = document.getElementById("giftContainer");
const devilBtn = document.getElementById("devilBtn");
const giveUpBtn = document.getElementById("giveUpBtn");
const hardcoreModeBtn = document.getElementById("hardcoreModeBtn");
const carModeBtn = document.getElementById("carModeBtn");

let isBIndoGame = false; 
let clickCount = 0;
let currentQuestion = 0;

document.getElementById("zero").addEventListener("click",()=>{
    clickCount++;
    if(clickCount >= 5){
        isBIndoGame = false; 
        giftContainer.style.display = "none"; 
        devilBtn.style.display = "none"; 
        giveUpBtn.style.display = "none";
        currentQuestion = 0; 
        showPage("gamePage");
        loadQuestion();
    }
});

brandLogo.addEventListener("click", () => showPage("askPage"));
btnNo.addEventListener("click", () => btnNo.style.display = "none");

btnYes.addEventListener("click", () => {
    isBIndoGame = true; 
    giftContainer.style.display = "flex"; 
    devilBtn.style.display = "none"; 
    giveUpBtn.style.display = "none"; 
    currentQuestion = 0; 
    activeQuestions = bIndoQuestions; 
    showPage("gamePage");
    loadQuestion();
});

devilBtn.addEventListener("click", () => document.body.classList.add("heavy-glitch-active"));

hardcoreModeBtn.addEventListener("click", () => {
    isBIndoGame = true;
    giftContainer.style.display = "none";
    devilBtn.style.display = "none";
    giveUpBtn.style.display = "block";
    currentQuestion = 0;
    activeQuestions = hardcoreQuestions; 
    showPage("gamePage");
    loadQuestion();
});

giveUpBtn.addEventListener("click", () => {
    giveUpBtn.style.display = "none";
    document.body.style.background = "black";
    setTimeout(() => {
        document.body.style.background = "white";
        setTimeout(() => {
            document.body.style.background = "black";
            setTimeout(() => {
                document.body.style.background = "white";
                document.body.classList.add("strobe-fast");
                setTimeout(() => {
                    document.body.classList.remove("strobe-fast");
                    const weakPage = document.getElementById("weakPage");
                    weakPage.style.display = "block";
                    weakPage.classList.add("heavy-glitch-active");
                    setInterval(() => {
                        const div = document.createElement("div");
                        div.className = "weak-text";
                        div.textContent = "WEAK!";
                        div.style.left = Math.random() * 100 + "vw";
                        div.style.top = Math.random() * 100 + "vh";
                        const size = Math.floor(Math.random() * 180) + 24; 
                        div.style.fontSize = size + "px";
                        const rotate = Math.floor(Math.random() * 60) - 30;
                        div.style.transform = `rotate(${rotate}deg)`;
                        const redVal = Math.floor(Math.random() * 180) + 70;
                        div.style.color = `rgb(${redVal}, 0, 0)`;
                        weakPage.appendChild(div);
                    }, 50); 
                }, 1500);
            }, 150);
        }, 800);
    }, 400);
});

// DATA SOAL
let activeQuestions = [
    { question:"5 + 3", answers:[8,6,10,12], correct:8 },
    { question:"12 - 7", answers:[3,5,8,10], correct:5 },
    { question:"8 × 4", answers:[32,28,9999,36], correct:32, secret:9999 },
    { question:"15 + 10", answers:[20,25,30,35], correct:25 },
    { question:"9 × 2", answers:[18,12,16,21], correct:18 }
];

const bIndoQuestions = [
    { question: "Hewan apa yang warnanya pink?", answers: ["Flamingo", "Gajah", "Kucing", "Singa"], correct: "Flamingo" },
    { question: "Gunung tertinggi di dunia adalah...", answers: ["Gunung Everest", "Gunung Merapi", "Gunung Fuji", "Gunung Anak Krakatau"], correct: "Gunung Everest" },
    { question: "Warna bendera negara Indonesia adalah...", answers: ["Merah Putih", "Biru Kuning", "Hijau Hitam", "Merah Putih Biru"], correct: "Merah Putih" },
    { question: "Ibukota negara Jepang adalah...", answers: ["Seoul", "Tokyo", "Beijing", "Bangkok"], correct: "Tokyo" },
    { question: "Berapa jumlah warna pada pelangi secara umum?", answers: ["5 warna", "6 warna", "7 warna", "8 warna"], correct: "7 warna" }
];

const hardcoreQuestions = [
    { question: "Siapakah gubernur Gotham City saat ini?", answers: ["Batman", "Joker", "Bukan urusan saya", "Mulyono"], correct: "Bukan urusan saya", kaburLevel: 1 },
    { question: "Jika 1 + 1 = 2, kenapa kamu masih jomblo?", answers: ["Takdir", "Kurang Spek", "Gak dapet restu algoritma", "Terlalu tampan"], correct: "Gak dapet restu algoritma", kaburLevel: 2 },
    { question: "Mana yang merupakan buah asli dari Bikini Bottom?", answers: ["Nanas Rumah SpongeBob", "Rumput Laut Hijau", "Kelapa Kotak", "Ubur-ubur Goreng"], correct: "Nanas Rumah SpongeBob", kaburLevel: 3 }
];

function loadQuestion(){
    feedbackError.textContent = "";
    const q = activeQuestions[currentQuestion];
    document.getElementById("progress").textContent = `Question ${currentQuestion+1}/${activeQuestions.length}`;
    document.getElementById("question").textContent = isBIndoGame ? q.question : q.question + " = ?";
    
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach(answer=>{
        const btn = document.createElement("button");
        btn.textContent = answer;

        if(q.kaburLevel && answer === q.correct) {
            btn.style.position = "absolute";
            btn.style.transition = "all 0.1s ease";
            let currentScale = 1;
            let currentRotation = 0;
            
            const lariMakinAneh = () => {
                btn.style.left = (Math.floor(Math.random() * 65) + 15) + "vw";
                btn.style.top = (Math.floor(Math.random() * 65) + 15) + "vh";
                if(q.kaburLevel >= 2) {
                    currentScale = Math.max(currentScale - 0.15, 0.3);
                    btn.style.transform = `scale(${currentScale})`;
                }
                if(q.kaburLevel === 3) {
                    currentRotation += Math.floor(Math.random() * 180) - 90;
                    btn.style.transform = `scale(${currentScale}) rotate(${currentRotation}deg)`;
                }
            };
            btn.addEventListener("mouseover", lariMakinAneh);
            btn.addEventListener("touchstart", lariMakinAneh);
        }

        btn.onclick = ()=>{
            if(q.secret && answer === q.secret){
                startSecretMode(); return;
            }
            if(answer === q.correct){
                currentQuestion++;
                if(currentQuestion >= activeQuestions.length){
                    showPage("finishPage");
                    giveUpBtn.style.display = "none"; 
                    if(isBIndoGame) {
                        devilBtn.style.display = "block";
                        if(activeQuestions === hardcoreQuestions) {
                            document.getElementById("finishTitle").textContent = "YOU ARE CRAZY! 🔥";
                            document.getElementById("finishSubtitle").textContent = "Kamu berhasil melewati Hardcore Mode.";
                            hardcoreModeBtn.style.display = "none"; 
                        }
                    }
                }else{
                    loadQuestion();
                }
            }else{
                if(isBIndoGame) { feedbackError.textContent = "Salah!"; } 
                else { alert("Wrong answer!"); }
            }
        };
        answersDiv.appendChild(btn);
    });
}

// SECRET MODE KODE LAMA
function startSecretMode(){
    if(!confirm("Do you want Secret Mode?")) return;
    if(!confirm("Are you sure?")) return;
    if(!confirm("Complete 3 difficult tasks to unlock Secret Mode.")) return;
    secretChallenge();
}
function secretChallenge(){
    if(prompt("Task 1\n\n17 × 13 = ?") !== "221"){ lose(); return; }
    if(prompt("Task 2\n\n144 ÷ 12 = ?") !== "12"){ lose(); return; }
    if(prompt(`Task 3\n\n2 + 2 = 8\n3 + 3 = 18\n4 + 4 = 32\n\n5 + 5 = ?`) !== "50"){ lose(); return; }
    unlockSecret();
}
function lose(){
    document.body.classList.add("glitch");
    setTimeout(()=>{
        document.body.innerHTML = `<div style="width:100vw; height:100vh; background:black; color:#550000; display:flex; justify-content:center; align-items:center; flex-direction:column; font-family:Arial;"><h1 style="font-size:72px;">YOU LOSE</h1><p>The secret rejects you.</p></div>`;
    },1200);
}
function unlockSecret(){
    document.body.innerHTML = `<div style="width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; font-family:Arial;"><h1>Secret Mode Unlocked...</h1><p id="loading">0%</p></div>`;
    let percent = 0;
    const interval = setInterval(()=>{
        percent += 5;
        document.getElementById("loading").textContent = percent + "%";
        if(percent >= 100){
            clearInterval(interval);
            setTimeout(()=> window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ", 1000);
        }
    },100);
}

// =========================================================
// FITUR UPDATE: KUIS RANDOM AKHIR
// =========================================================
const finalQuestions = [
    { q: "1 + 1 x 0 = ?", a: ["0", "1", "2", "11"], c: "1" },
    { q: "Bulan apa yang punya 28 hari?", a: ["1 bulan", "12 bulan", "Februari doang", "Gak ada"], c: "12 bulan" },
    { q: "Ayam apa yang paling bikin kesel?", a: ["Ayam tiren", "Ayam kampus", "Ayamnya habis", "Ayam geprek"], c: "Ayamnya habis" },
    { q: "Kalo dipukul yang mukul malah kesakitan, apa itu?", a: ["Besi", "Nyamuk nempel di hidung", "Batu", "Paku"], c: "Nyamuk nempel di hidung" },
    { q: "Pintu apa yang ditarik sama 10 orang ga kebuka?", a: ["Pintu brankas", "Pintu didorong", "Pintu ajaib", "Pintu rusak"], c: "Pintu didorong" }
];
let finalIndex = 0;

document.getElementById("btnTidakGame").addEventListener("click", function() {
    this.style.display = "none";
});

document.getElementById("btnLanjutGame").addEventListener("click", () => {
    showPage("randomQuizPage");
    finalIndex = 0;
    loadFinalQuestion();
});

function loadFinalQuestion() {
    const fb = document.getElementById("finalFeedback");
    fb.textContent = "";
    const q = finalQuestions[finalIndex];
    document.getElementById("finalProgress").textContent = `Soal ${finalIndex+1}/${finalQuestions.length}`;
    document.getElementById("finalQuestion").textContent = q.q;
    
    const ansDiv = document.getElementById("finalAnswers");
    ansDiv.innerHTML = "";
    
    q.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.onclick = () => {
            if(answer === q.c) {
                finalIndex++;
                if(finalIndex >= finalQuestions.length) {
                    window.location.href = "https://www.youtube.com/watch?v=a4H0Dcf0rk8";
                } else {
                    loadFinalQuestion();
                }
            } else {
                fb.textContent = "Salah bro!";
            }
        };
        ansDiv.appendChild(btn);
    });
}

// =========================================================
// FITUR UPDATE: GAME MOBIL 3D (THREE.JS)
// =========================================================
let carGameInitialized = false;
let carGameRunning = false;
let car, scene, camera, renderer;
let yellowObjects = [];
let collected = 0;
const keys = { up: false, down: false, left: false, right: false };
let speed = 0;

carModeBtn.addEventListener("click", () => {
    showPage("carGamePage");
    if (!carGameInitialized) {
        initCarGame();
        carGameInitialized = true;
    }
    carGameRunning = true;
    animateCarGame();
});

function initCarGame() {
    const canvas = document.getElementById("gameCanvas");
    scene = new THREE.Scene();
    // Warna langit & kabut buat nutupin ujung map
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Lampu
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // Fungsi Matematika Bikin Tanah Naik Turun
    function getTerrainHeight(x, z) {
        return Math.sin(x / 12) * Math.cos(z / 12) * 4;
    }

    // 1. Buat Terrain/Tanah
    const terrainGeo = new THREE.PlaneGeometry(300, 300, 60, 60);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let z = pos.getZ(i);
        pos.setY(i, getTerrainHeight(x, z));
    }
    terrainGeo.computeVertexNormals();
    const terrainMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 }); // Warna tanah/coklat
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    scene.add(terrain);

    // 2. Buat Mobil Kotak
    car = new THREE.Group();
    // Body mobil
    const bodyGeo = new THREE.BoxGeometry(3, 1.5, 5);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 }); // Mobil merah
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.5;
    car.add(body);
    
    // Ban Kotak Hitam (4 buah)
    const wheelGeo = new THREE.BoxGeometry(0.8, 1, 1);
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const positions = [
        [-1.6, 0.5, 1.5], [1.6, 0.5, 1.5],
        [-1.6, 0.5, -1.5], [1.6, 0.5, -1.5]
    ];
    positions.forEach(p => {
        let w = new THREE.Mesh(wheelGeo, wheelMat);
        w.position.set(p[0], p[1], p[2]);
        car.add(w);
    });
    scene.add(car);

    // 3. Objek Kuning (Target Koleksi)
    for (let i = 0; i < 5; i++) {
        let geo = new THREE.BoxGeometry(2, 2, 2);
        let mat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
        let mesh = new THREE.Mesh(geo, mat);
        let rx = (Math.random() - 0.5) * 200;
        let rz = (Math.random() - 0.5) * 200;
        mesh.position.set(rx, getTerrainHeight(rx, rz) + 1.5, rz);
        scene.add(mesh);
        yellowObjects.push({ mesh: mesh, active: true });
    }

    // 4. Dekorasi Pohon Kotak Random
    for(let i = 0; i < 60; i++){
        let tree = new THREE.Group();
        let trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 1), new THREE.MeshLambertMaterial({color: 0x4a3219}));
        trunk.position.y = 1.5;
        let leaves = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshLambertMaterial({color: 0x228b22}));
        leaves.position.y = 4;
        tree.add(trunk); tree.add(leaves);
        
        let tx = (Math.random() - 0.5) * 250;
        let tz = (Math.random() - 0.5) * 250;
        tree.position.set(tx, getTerrainHeight(tx, tz), tz);
        scene.add(tree);
    }

    // Setup Kontrol Mobile (Touch & Mouse)
    const btnUp = document.getElementById("btnUp");
    const btnDown = document.getElementById("btnDown");
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    const addControl = (btn, key) => {
        btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
        btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
        btn.addEventListener("mousedown", () => keys[key] = true);
        btn.addEventListener("mouseup", () => keys[key] = false);
        btn.addEventListener("mouseleave", () => keys[key] = false);
    };

    addControl(btnUp, 'up'); addControl(btnDown, 'down');
    addControl(btnLeft, 'left'); addControl(btnRight, 'right');

    // Setup Kontrol Keyboard Desktop
    window.addEventListener("keydown", (e) => {
        if(e.key === "ArrowUp" || e.key === "w") keys.up = true;
        if(e.key === "ArrowDown" || e.key === "s") keys.down = true;
        if(e.key === "ArrowLeft" || e.key === "a") keys.left = true;
        if(e.key === "ArrowRight" || e.key === "d") keys.right = true;
    });
    window.addEventListener("keyup", (e) => {
        if(e.key === "ArrowUp" || e.key === "w") keys.up = false;
        if(e.key === "ArrowDown" || e.key === "s") keys.down = false;
        if(e.key === "ArrowLeft" || e.key === "a") keys.left = false;
        if(e.key === "ArrowRight" || e.key === "d") keys.right = false;
    });

    // Handle Resize Layar
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    // Game Loop Physics & Render
    function animate() {
        if (!carGameRunning) return;
        requestAnimationFrame(animate);

        // Fisika Gas & Rem
        if (keys.up) speed += 0.02;
        if (keys.down) speed -= 0.02;
        speed *= 0.95; // Gesekan tanah
        
        // Rotasi Stir
        if (keys.left && Math.abs(speed) > 0.01) car.rotation.y += 0.04 * Math.sign(speed);
        if (keys.right && Math.abs(speed) > 0.01) car.rotation.y -= 0.04 * Math.sign(speed);

        car.translateZ(-speed);

        // Batas Map
        if(car.position.x > 140) car.position.x = 140;
        if(car.position.x < -140) car.position.x = -140;
        if(car.position.z > 140) car.position.z = 140;
        if(car.position.z < -140) car.position.z = -140;

        // Bikin mobil ngikutin naik turun tanah
        car.position.y = getTerrainHeight(car.position.x, car.position.z);

        // Kamera ngikutin dari belakang
        const relativeCameraOffset = new THREE.Vector3(0, 8, 18); // Posisi dibelakang atas
        const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
        camera.position.lerp(cameraOffset, 0.1); // Smooth follow
        camera.lookAt(car.position);

        // Cek Tabrakan Koleksi Objek Kuning
        yellowObjects.forEach((obj) => {
            if (obj.active && car.position.distanceTo(obj.mesh.position) < 4) {
                obj.active = false;
                scene.remove(obj.mesh);
                collected++;
                document.getElementById("yellowCounter").innerText = collected;
                
                // Menang Game Mobil
                if (collected >= 5) {
                    carGameRunning = false;
                    setTimeout(() => {
                        showPage("postGamePage");
                    }, 500);
                }
            }
        });

        renderer.render(scene, camera);
    }
    
    // Simpan function animate ke variable global supaya dipanggil saat play
    window.animateCarGame = animate;
}
</script>

</body>
</html>
