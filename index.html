<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heyyo.com</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:white;
    color:black;
}

/* ==================== TAMBAHAN STYLE BARU ==================== */
.navbar {
    width: 100%;
    padding: 15px 20px;
    box-sizing: border-box;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 999;
}

#brand-logo {
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    display: inline-block;
}

.choice-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

#feedback-error {
    margin-top: 15px;
    font-weight: bold;
    color: red;
    height: 20px;
}

.gift-btn {
    background: #ff4757;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    padding: 12px 25px;
    margin-top: 15px;
    cursor: pointer;
}
/* ============================================================== */

.page{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

#zero{
    font-size:120px;
    cursor:pointer;
    user-select:none;
}

button{
    padding:10px 20px;
    margin:5px;
    border:1px solid black;
    background:white;
    cursor:pointer;
}

.question{
    font-size:30px;
    margin-bottom:20px;
}

.answers{
    display:flex;
    flex-direction:column;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-5px,5px);}
    40%{transform:translate(5px,-5px);}
    60%{transform:translate(-5px,0);}
    80%{transform:translate(5px,0);}
    100%{transform:translate(0);}
}

.glitch{
    animation:glitch 0.1s infinite;
}
</style>
</head>

<body>

<!-- TAMBAHAN: Menu Heyyo di Kiri Atas -->
<div class="navbar">
    <div id="brand-logo">heyyo</div>
</div>

<div id="homePage" class="page active">
    <div id="zero">0</div>
</div>

<!-- TAMBAHAN: Halaman Pertanyaan Wanna Play Game -->
<div id="askPage" class="page">
    <h1 class="question">You wanna play game?</h1>
    <div class="choice-container">
        <button id="btnYes">Yes</button>
        <button id="btnNo">No</button>
    </div>
</div>

<div id="gamePage" class="page">
    <h1>Let's Play</h1>

    <div id="progress"></div>

    <div class="question" id="question"></div>

    <div class="answers" id="answers"></div>
    
    <!-- TAMBAHAN: Tempat notifikasi kalau jawaban b indo salah -->
    <div id="feedback-error"></div>
</div>

<div id="finishPage" class="page">
    <h1>Congratulations!</h1>
    <p>You completed all questions.</p>
    
    <!-- TAMBAHAN: Tombol Hadiah di bawah tulisan congratulation -->
    <button id="giftBtnButton" class="gift-btn" style="display:none;" onclick="window.location.href='https://www.youtube.com/watch?v=a4H0Dcf0rk8'">
        Hadiah 🎁✨
    </button>
</div>

<script>

const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
const finishPage = document.getElementById("finishPage");

/* TAMBAHAN VARIABEL BARU */
const brandLogo = document.getElementById("brand-logo");
const askPage = document.getElementById("askPage");
const btnYes = document.getElementById("btnYes");
const btnNo = document.getElementById("btnNo");
const feedbackError = document.getElementById("feedback-error");
const giftBtnButton = document.getElementById("giftBtnButton");
let isBIndoGame = false; 
/* ======================= */

let clickCount = 0;

document.getElementById("zero").addEventListener("click",()=>{

    clickCount++;

    if(clickCount >= 5){
        isBIndoGame = false; // Memastikan pakai soal bawaan jika lewat klik angka 0
        giftBtnButton.style.display = "none"; // Sembunyikan tombol hadiah baru untuk game asli
        currentQuestion = 0; // Reset index soal
        showPage(gamePage);
        loadQuestion();
    }

});

/* TAMBAHAN LOGIKA UNTUK MENU HEYYO */
brandLogo.addEventListener("click", () => {
    showPage(askPage);
});

btnNo.addEventListener("click", () => {
    btnNo.style.display = "none"; // Tombol "No" menghilang saat di-klik
});

btnYes.addEventListener("click", () => {
    isBIndoGame = true; // Menandai kalau user masuk lewat jalur game B. Indonesia
    giftBtnButton.style.display = "block"; // Munculkan tombol hadiah baru nanti di akhir
    currentQuestion = 0; // Reset index soal
    questions = bIndoQuestions; // Ganti kumpulan soal ke versi Bahasa Indonesia
    showPage(gamePage);
    loadQuestion();
});
/* ================================= */

function showPage(page){

    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    page.classList.add("active");

}

// KODE ASLI: Array questions awal dideklarasikan pakai 'let' agar bisa ditukar datanya
let questions = [

{
question:"5 + 3",
answers:[8,6,10,12],
correct:8
},

{
question:"12 - 7",
answers:[3,5,8,10],
correct:5
},

{
question:"8 × 4",
answers:[32,28,9999,36],
correct:32,
secret:9999
},

{
question:"15 + 10",
answers:[20,25,30,35],
correct:25
},

{
question:"9 × 2",
answers:[18,12,16,21],
correct:18
}

];

/* TAMBAHAN: Data 5 Soal Bahasa Indonesia Baru */
const bIndoQuestions = [
    {
        question: "Hewan apa yang warnanya pink?",
        answers: ["Flamingo", "Gajah", "Kucing", "Singa"],
        correct: "Flamingo"
    },
    {
        question: "Gunung tertinggi di dunia adalah...",
        answers: ["Gunung Everest", "Gunung Merapi", "Gunung Fuji", "Gunung Anak Krakatau"],
        correct: "Gunung Everest"
    },
    {
        question: "Warna bendera negara Indonesia adalah...",
        answers: ["Merah Putih", "Biru Kuning", "Hijau Hitam", "Merah Putih Biru"],
        correct: "Merah Putih"
    },
    {
        question: "Ibukota negara Jepang adalah...",
        answers: ["Seoul", "Tokyo", "Beijing", "Bangkok"],
        correct: "Tokyo"
    },
    {
        question: "Berapa jumlah warna pada pelangi secara umum?",
        answers: ["5 warna", "6 warna", "7 warna", "8 warna"],
        correct: "7 warna"
    }
];
/* ========================================== */

let currentQuestion = 0;

function loadQuestion(){

    // TAMBAHAN: Reset teks error tulisan salah setiap muat soal baru
    feedbackError.textContent = "";

    const q = questions[currentQuestion];

    document.getElementById("progress").textContent =
    `Question ${currentQuestion+1}/${questions.length}`;

    // MODIFIKASI SEDIKIT: Tambahkan format " = ?" hanya jika bukan game B. Indonesia
    document.getElementById("question").textContent =
    isBIndoGame ? q.question : q.question + " = ?";

    const answersDiv =
    document.getElementById("answers");

    answersDiv.innerHTML = "";

    q.answers.forEach(answer=>{

        const btn = document.createElement("button");

        btn.textContent = answer;

        btn.onclick = ()=>{

            if(q.secret && answer === q.secret){
                startSecretMode();
                return;
            }

            if(answer === q.correct){

                currentQuestion++;

                if(currentQuestion >= questions.length){
                    showPage(finishPage);
                }else{
                    loadQuestion();
                }

            }else{
                // MODIFIKASI: Jika lewat game B. Indonesia, tulisan salah muncul tanpa mengulang
                if(isBIndoGame) {
                    feedbackError.textContent = "Salah!";
                } else {
                    alert("Wrong answer!");
                }
            }

        };

        answersDiv.appendChild(btn);

    });

}

function startSecretMode(){

    const first =
    confirm("Do you want Secret Mode?");

    if(!first) return;

    const second =
    confirm("Are you sure?");

    if(!second) return;

    const third =
    confirm("Complete 3 difficult tasks to unlock Secret Mode.");

    if(!third) return;

    secretChallenge();

}

function secretChallenge(){

    const q1 =
    prompt("Task 1\n\n17 × 13 = ?");

    if(q1 !== "221"){
        lose();
        return;
    }

    const q2 =
    prompt("Task 2\n\n144 ÷ 12 = ?");

    if(q2 !== "12"){
        lose();
        return;
    }

    const q3 =
    prompt(`Task 3

2 + 2 = 8
3 + 3 = 18
4 + 4 = 32

5 + 5 = ?`);

    if(q3 !== "50"){
        lose();
        return;
    }

    unlockSecret();

}

function lose(){

    document.body.classList.add("glitch");

    setTimeout(()=>{

        document.body.innerHTML = `
        <div style="
            width:100vw;
            height:100vh;
            background:black;
            color:#550000;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-family:Arial;
        ">
            <h1 style="font-size:72px;">YOU LOSE</h1>
            <p>The secret rejects you.</p>
        </div>
        `;

    },1200);

}

function unlockSecret(){

    document.body.innerHTML = `
    <div style="
        width:100vw;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        font-family:Arial;
    ">
        <h1>Secret Mode Unlocked...</h1>
        <p id="loading">0%</p>
    </div>
    `;

    let percent = 0;

    const interval = setInterval(()=>{

        percent += 5;

        document.getElementById("loading").textContent =
        percent + "%";

        if(percent >= 100){

            clearInterval(interval);

            setTimeout(()=>{

                window.location.href =
                "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

            },1000);

        }

    },100);

}

</script>

</body>
</html>
